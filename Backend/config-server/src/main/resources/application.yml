spring.application.name: config-server

spring:
  cloud:
    config:
      server:
        git:
          uri: https://github.com/deepakbarajati/campusConnect-config-server
          username: ${USER_NAME}
          password: ${github_config_server_token}
          default-label: ${repo_branch}

server:
  port: 8888

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
