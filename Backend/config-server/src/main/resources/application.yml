spring:
  application:
    name: config-server

  profiles:
    active: git
  cloud:
    config:
      server:
        git:
          uri: https://github.com/deepakbarajati/campusConnect-config-server
          username: ${GIT_USERNAME}
          password: ${GIT_TOKEN}
          default-label: ${GIT_BRANCH:main}

server:
  port: 8888

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka}
  instance:
    prefer-ip-address: true

logging:
  level:
    com.campusConnect: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
